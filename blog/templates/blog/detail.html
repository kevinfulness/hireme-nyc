<!-- blog/templates/blog/detail.html -->

{% extends "base.html" %}
{% load static %}
{% block styles %}
	<link rel="stylesheet" href="{% static "detail.css" %}" />
{% endblock styles %}

{% block page_content %}

<div class="page_title" id="detail_title">
	<h1>{{ post.title }}</h1>
</div>

<div class="post_wrapper">
	{{ post.body | safe }}
</div>


<div class="lightbox">
	<div class="lightbox_content">
		<h3 class="lightbox_close">&times;</h3>
		<div class="lightbox_image__container"></div>
	</div>
</div>


{% endblock page_content %}
